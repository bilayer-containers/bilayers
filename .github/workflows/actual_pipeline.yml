name: Temporary Pipeline

on:
  push:
    branches:
      - actual_pipeline_fix

jobs:
    try-which-machine:
        name: Try which machine
        strategy:
          matrix:
            algorithm_name: [classical_segmentation, cellpose_inference]
            interface_name: [gradio, jupyter]
        runs-on: ubuntu-latest

        steps: 
            - name: Run architecture check
              run: |
                echo "Runner architecture: $(uname -a)"
                docker run --rm ubuntu:latest uname -a

            - name: Checkout Repository
              uses: actions/checkout@v3
        
            - name: Set up Python 3.9
              uses: actions/setup-python@v4
              with:
                python-version: 3.9
        
            - name: Install nox
              run: |
                pip install nox
                # TODO: remove this as a sessiond dependency
                pip install pyyaml

            - name: Set up Docker Buildx (for multi-arch builds)
              uses: docker/setup-buildx-action@v2
            
            - name: Cache Docker layers
              uses: actions/cache@v3
              with:
                path: /tmp/.buildx-cache
                key: ${{ runner.os }}-buildx-${{ github.sha }}
                restore-keys: |
                  ${{ runner.os }}-buildx-

            - name: Process Algorithm-Interface Pair
              env:
                ALGORITHM_NAME: ${{ matrix.algorithm }}
                INTERFACE_NAME: ${{ matrix.interface }}
              run: |
                  echo "Processing Algorithm: ${{ matrix.algorithm_name }}, Interface: ${{ matrix.algorithm_name }}
                  cd $GITHUB_WORKSPACE
                  
                  # Run the parse script
                  CONFIG_PATH=src/algorithms/${ALGORITHM_NAME}/config.yaml
                  nox -s run_parse -- $CONFIG_PATH
        
                  # Run the generate script
                  nox -s run_generate -- $CONFIG_PATH
          
                  # Build the Algorithm Docker image
                  nox -s build_algorithm -- $ALGORITHM_NAME   

                  # Build the Interface Docker image
                  nox -s build_interface -- $INTERFACE_NAME $ALGORITHM_NAME
            
            - name: Install Gradio Interface
              if: matrix.interface == 'gradio'
              run: |
                  nox -s install_gradio
            